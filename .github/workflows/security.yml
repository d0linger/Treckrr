name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.4"

jobs:
  gosec:
    name: GOSec (static security scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod tidy
      - name: Run gosec
        uses: securego/gosec@v2.27.1
        env:
          # The gosec container bundles its own Go with GOTOOLCHAIN=local,
          # which can lag behind the go.mod requirement (e.g. 1.26.2 vs
          # 1.26.4). Let it download the exact toolchain instead.
          GOTOOLCHAIN: go1.26.4
        with:
          # Excluded rules (all reviewed and intentional):
          #   G115 – int64→uint64 of a non-negative Unix time (TOTP counter); safe.
          #   G505 – crypto/sha1: RFC 6238 (TOTP) mandates HMAC-SHA1.
          #   G124 – cookies use a deliberately dynamic Secure flag so the app can
          #          run over plain HTTP behind a TLS-terminating reverse proxy
          #          (HttpOnly + SameSite are always set on session cookies).
          #   G706 – log injection: request-derived fields are sanitised via
          #          sanitizeLog(); gosec's taint analysis can't see the custom
          #          sanitiser, so it is excluded rather than left unmitigated.
          args: -exclude=G115,G124,G505,G706 ./...

  govulncheck:
    name: GOVul (vulnerability check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod tidy
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
