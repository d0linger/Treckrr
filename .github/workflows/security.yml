name: Security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 6 * * 1" # weekly, Monday 06:23 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.24"

jobs:
  gosec:
    name: GOSec (static security scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod tidy
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: ./...

  govulncheck:
    name: GOVul (vulnerability check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - run: go mod tidy
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
