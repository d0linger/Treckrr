name: DeadCode

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"

jobs:
  deadcode:
    name: DeadCode (unreachable function analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: go mod tidy
      - name: Install deadcode
        run: go install golang.org/x/tools/cmd/deadcode@latest
      - name: Run deadcode
        # deadcode always exits 0, so fail the job explicitly on any finding.
        # -test keeps functions reachable only from tests from being flagged.
        run: |
          out=$(deadcode -test ./...)
          if [ -n "$out" ]; then
            echo "Dead code found:"
            echo "$out"
            exit 1
          fi
          echo "No dead code found."
