name: GODep (Dependency Review)

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Review dependencies for known vulnerabilities
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
