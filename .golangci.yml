version: "2"
run:
  tests: true
linters:
  enable:
    - bodyclose
    - gosec
    - misspell
    - revive
    - unconvert
    - whitespace
  settings:
    gosec:
      # Excluded rules (all reviewed and intentional, kept in sync with the
      # gosec job in .github/workflows/security.yml):
      #   G115 – int64→uint64 of a non-negative Unix time (TOTP counter); safe.
      #   G505 – crypto/sha1: RFC 6238 (TOTP) mandates HMAC-SHA1.
      #   G124 – cookies use a deliberately dynamic Secure flag so the app can
      #          run over plain HTTP behind a TLS-terminating reverse proxy.
      #   G706 – log injection: request-derived fields are sanitised via
      #          sanitizeLog(); gosec's taint analysis can't see it.
      excludes:
        - G115
        - G124
        - G505
        - G706
    misspell:
      locale: US
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: internal/server/
        text: Error return value of .*(Write|Encode|SetCookie).* is not checked
      - linters:
          - gosec
        path: internal/totp/
        text: G505|G115
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - treckrr
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
