# golangci-lint configuration for Treckrr.
run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - gosec
    - unconvert
    - whitespace

linters-settings:
  goimports:
    local-prefixes: treckrr
  misspell:
    locale: US
  revive:
    rules:
      - name: exported
        disabled: true

issues:
  exclude-rules:
    # Allow ignored errors on best-effort writes (flash cookies, CSV writer).
    - path: internal/server/
      linters: [errcheck]
      text: "Error return value of .*(Write|Encode|SetCookie).* is not checked"
    # TOTP (RFC 6238) requires HMAC-SHA1; counter conversions are provably safe.
    - path: internal/totp/
      linters: [gosec]
      text: "G505|G115"
  max-issues-per-linter: 0
  max-same-issues: 0
