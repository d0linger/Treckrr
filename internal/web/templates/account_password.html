{{define "content"}}
<section class="stack">
	{{if .Forced}}
	<div class="flash flash--info">Bitte lege ein neues, persönliches Passwort fest, bevor du fortfährst.</div>
	{{end}}
	<div class="card">
		<h2 class="section-title">Passwort ändern</h2>
		<form method="post" action="/account/password" class="form">
			<label class="field"><span>Aktuelles Passwort</span>
				<div class="pwwrap">
					<input class="input" type="password" name="current_password" autocomplete="current-password" required>
					<button class="pw-toggle" type="button" data-pw-toggle aria-label="Passwort anzeigen" aria-pressed="false">{{template "ic-eye"}}</button>
				</div></label>
			<label class="field"><span>Neues Passwort</span>
				<div class="pwwrap">
					<input class="input" type="password" name="new_password" minlength="8" autocomplete="new-password" required data-pw-new>
					<button class="pw-toggle" type="button" data-pw-toggle aria-label="Passwort anzeigen" aria-pressed="false">{{template "ic-eye"}}</button>
				</div>
				<small class="muted">Mind. 8 Zeichen, Buchstaben und Ziffern.</small></label>
			<label class="field"><span>Neues Passwort bestätigen</span>
				<div class="pwwrap">
					<input class="input" type="password" name="new_password_confirm" minlength="8" autocomplete="new-password" required data-pw-confirm>
					<button class="pw-toggle" type="button" data-pw-toggle aria-label="Passwort anzeigen" aria-pressed="false">{{template "ic-eye"}}</button>
				</div>
				<span class="pw-match" data-pw-match aria-live="polite"></span></label>
			<button class="btn btn--primary btn--block" type="submit">Passwort speichern</button>
		</form>
	</div>
	{{if not .Forced}}
	<p class="muted center"><a class="link" href="/profile">Zurück zum Profil</a></p>
	{{end}}
</section>
{{end}}
